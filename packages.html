<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EJ | Packages</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
  background:linear-gradient(to right,#00264d,#990000);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

h1{text-align:center;margin-bottom:25px}

.package-buttons{
  display:flex;
  flex-direction:column;
  gap:20px;
  width:100%;
  max-width:400px;
}

button{
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:1rem;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

#tiktokBtn, #socialBtn {
  background:#ff3b3b;
  color:#fff;
}

button:hover{transform:scale(1.05)}
</style>
</head>

<body>

<h1 id="title">Choose a Package</h1>

<div class="package-buttons">
  <button id="tiktokBtn">TikTok Promotion</button>
  <button id="socialBtn">Social Media Management</button>
</div>

<script>
const title = document.getElementById("title");
const tiktokBtn = document.getElementById("tiktokBtn");
const socialBtn = document.getElementById("socialBtn");

function setLang(lang){
  if(lang==="am"){
    title.innerText="ፓኬጅ ይምረጡ";
    tiktokBtn.innerText="የTikTok ማስታወቂያ";
    socialBtn.innerText="ሶሻል ሚዲያ አስተዳደር";
  }else{
    title.innerText="Choose a Package";
    tiktokBtn.innerText="TikTok Promotion";
    socialBtn.innerText="Social Media Management";
  }
}

const saved = localStorage.getItem("lang") || "en";
setLang(saved);

tiktokBtn.onclick = ()=> window.location="tiktok-promo-details.html";
socialBtn.onclick = ()=> window.location="social-management-details.html";
</script>

</body>
</html>
